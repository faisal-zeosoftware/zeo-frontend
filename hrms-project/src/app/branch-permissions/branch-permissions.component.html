
<div class="container" *ngIf="hasViewPermission">
    <div class="comapny_section">

        <div class="header_section">

            <div class="row">
                <div class="col-md-4">
                    <h1>Branch Permission For User</h1>
                </div>

                <div class="col-md-3">
                    
                    <!-- <input type="text" class="form-control mt-1" placeholder="Search by name " [(ngModel)]="searchQuery" (input)="filterEmployees()"> -->

                </div>
                <div class="col-md-5">
                    <div class="button-group pull-right">
                        <button type="button" (click)="openPopus()" class="btn-Create btn btn-success " *ngIf="hasAddPermission"><span class="header-btn-icon"><mat-icon>add_circle
                        </mat-icon></span> Create</button>
                      <span *ngIf="!hasAddPermission"></span>

                        <button type="button" class="btn-Edit btn-info btn"  (click)="EditShowButtons()" *ngIf="hasEditPermission" >
                            <span class="header-btn-icon">
                             <mat-icon>draw
                        </mat-icon></span> Edit</button>
                        <span *ngIf="hasEditPermission"></span>
                        <button type="button" class="btn-Delete btn btn-danger" (click)="toggleCheckboxes()" *ngIf="hasDeletePermission">
                            <span class="header-btn-icon">
                                <mat-icon> delete
                           </mat-icon></span> {{ Delete ? 'Cancel' : 'Delete' }}</button>

                           <span *ngIf="!hasDeletePermission"></span>
                    </div>
                </div>
            </div>
           
           

        </div>

        <div class="row">
            <div class="col-md-2">
                
                <button  class=" mt-3 btn-danger btn " style="width: 100%;" color="warn" *ngIf="Delete" (click)="toggleSelectAllEmployees()">Select All</button>

            </div>
            <div class="col-md-3">
                <button class=" mt-3 btn-danger btn"  color="warn" *ngIf="Delete" (click)="deleteSelectedPermissions()">Delete Selected </button>

            </div>
        </div>
      

      

        <div *ngIf="iscreateLoanApp" class="modal">
            <div class="modal-content">
              <div class="row">
                <div class="col-md-10">
                  <h2>Assign User</h2>
                </div>
<div class="col-md-2 text-right">
    <!-- Styled Square Close Button -->
    <span class="close-btn" (click)="closeapplicationModal()">
      ×
    </span>
  </div>
              </div>
              <hr />

         <form>
                    <div class="row">

                        <div class="col-md-6">
                            <div class="custom-sel">
                                <label>Select User</label>
<select
  class="form-control"
  required
  [(ngModel)]="user"
  name="user"
>
  <option [ngValue]="null">-- Select User --</option>
  <option *ngFor="let u of users" [ngValue]="u.id">
    {{ u.username }}
  </option>
</select>
            </div>
      </div>
                        

      <div class="col-md-6" >
        <label>Branch</label>
        <div class="custom-sel">
          <div class="form-control-wrapper">
          

<mat-form-field appearance="outline" class="w-100">
  <mat-select
    placeholder="Select Branch"
    [(ngModel)]="branch"
    name="branch"
    multiple
    #selectBrach
  >

    <mat-checkbox
      class="px-2"
      [(ngModel)]="allSelectedBrach"
      [ngModelOptions]="{ standalone: true }"
      (change)="toggleAllSelectionBrach()"
    >
      Select All
    </mat-checkbox>

    <mat-option
      *ngFor="let b of Branches"
      [value]="b.id"
    >
      {{ b.branch_name }}
    </mat-option>

  </mat-select>
</mat-form-field>
            
          </div>
         
        </div>

      </div>


                    </div>


            <div class="row">
                <div class="col-md-8">
                </div>
            <div class="col-md-2">
              <button type="button" class="btn-Create btn-full mt-5 btn-danger btn" (click)="closeapplicationModal()">Cancel</button>  
            </div>
                <div class="col-md-2">
                    <button type="button" class="btn-Create btn-full mt-5 btn-success btn" (click)="registerUserAssignedPermission()">Save</button>  
                 </div>
            </div>
            
       
    </form>

            
            </div>
          </div>

          <!-- Edit Modal -->
<div *ngIf="isUserPereditModalOpen" class="modal">
    <div class="modal-content">
      <div class="row">
        <div class="col-md-10">
          <h2>Edit Assigned Permission</h2>
        </div>
  <div class="col-md-2 text-right">
    <!-- Styled Square Close Button -->
    <span class="close-btn" (click)="closeEditPerModal()">
      ×
    </span>
  </div>
      </div>
      <hr />
  
      <form>
        <div class="row">
                        <div class="col-md-6">
                            <div class="custom-sel">
                                <label>Select User</label>
<select
  class="form-control"
  id="user"
  name="user"
  [(ngModel)]="user"
>

  <option [ngValue]="null">-- Select User --</option>

  <option
    *ngFor="let deparmentsec of users"
    [ngValue]="deparmentsec.id"
  >
    {{ deparmentsec.username }}
  </option>

</select>
                                <div *ngIf="registerButtonClicked && !user" class="error-message">Please Select User</div>
                            </div>
                        </div>
            
      <div class="col-md-6" >
        <label>Branch</label>
        <div class="custom-sel">
          <div class="form-control-wrapper">
          

            <mat-form-field>
              <!-- <mat-label>Favorite food</mat-label> -->
              <mat-select placeholder="Select" [(ngModel)]="branch" [ngModelOptions]="{standalone: true}" #selectBrach multiple>
                <div class="select-all">
                  <mat-checkbox [(ngModel)]="allSelectedBrach" [ngModelOptions]="{standalone: true}" (change)="toggleAllSelectionBrach()">
                    Select All
                  </mat-checkbox>
                </div>
                <input type="text" placeholder="serach" class="form-control">

                <mat-option *ngFor="let branchs of Branches" [value]="branchs.id">{{ branchs.branch_name }}
                </mat-option>
              </mat-select>
            </mat-form-field>
            
          </div>
         
        </div>

      </div>
            
        </div>
  
        <div class="row">
          <div class="col-md-8"></div>
          <div class="col-md-2">
              <button type="button" class="btn-Create btn-full mt-5 btn-danger btn" (click)="closeEditPerModal()">Cancel</button>  
            </div>
          <div class="col-md-2">
            <button
              type="button"
              class="btn-Create btn-full mt-5 btn-success btn"
              (click)="updateUserPermission()"
            >
              Update
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>


     <div class="com_list mt-4"  *ngIf="hasViewPermission">
        <table width="100%" *ngIf="hasViewPermission">
  <thead>
    <tr>
      <th>No</th>
      <th>User</th>
      <th>Branch Name</th>
      <th *ngIf="hasEditPermission || hasDeletePermission">Action</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let per of UserPermissions; let i = index">
      <td data-label="No">{{ i + 1 }}</td>

      <td data-label="User">
        {{ per.user }}
      </td>

      <td data-label="Branch Name">
        <ng-container *ngIf="per.branch?.length; else noBranch">
          <span *ngFor="let b of per.branch; let last = last">
            {{ b.branch_name }}<span *ngIf="!last">, </span>
          </span>
        </ng-container>

        <ng-template #noBranch>
          <span class="text-muted">No Branch Assigned</span>
        </ng-template>
      </td>

     <td data-label="Action">

                        <button
                          mat-fab
                          color="primary"
                          aria-label="Edit icon"
                          *ngIf="showEditBtn"

                          
                          (click)="openEditPerModal(per)"
                        >
                          <mat-icon style="color: white;">draw</mat-icon>
                        </button>

                        <mat-checkbox *ngIf="Delete" [(ngModel)]="per.selected" ></mat-checkbox>

                      </td>
    </tr>
  </tbody>
</table>

</div>
  

        </div>
        </div>
