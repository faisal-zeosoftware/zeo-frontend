<div mat-dialog-content class="success-dialog">

    <button class="close-btn" (click)="closeapplicationModal()">
        &times;
    </button>

    <div class="success-card">

        <div class="icon-wrapper">
            <mat-icon class="success-icon">check_circle</mat-icon>
        </div>

        <h2>Employee Added Successfully!</h2>

        <p class="subtitle">
            The employee has been added successfully.
        </p>

        <div class="question-box">
            <h3>Do you want to connect this employee to a user account?</h3>

            <div class="button-group">
                <button
                    type="button"
                    class="btn btn-danger"
                    (click)="closeapplicationModal()">
                    No, Later
                </button>

                <button
                    type="button"
                    class="btn btn-success"
                    (click)="onYesConnect()">
                    Yes, Connect
                </button>
            </div>
        </div>

    </div>

</div>
