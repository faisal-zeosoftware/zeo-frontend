<div mat-dialog-content class="">

    <div class="cpm-sec" *ngIf="department" >
        <span class="close pull-right" (click)="ClosePopup()">&times;</span>

        <h1>Edit Department</h1><hr>

        <form (submit)="updateCategory()">
        <div class="row" >

            <div class="col-md-6" >
               
                <label>Department Name</label>
               <input type="text"  class="form-control" required id="dept_name" name="dept_name"  [(ngModel)]="department.dept_name"  placeholder="Enter department name "
                [ngModelOptions]="{standalone: true}" [ngClass]="{'error-field': registerButtonClicked && !dept_name}">
               
               <div *ngIf="registerButtonClicked && !dept_name" class="error-message">Description is required.</div>
            </div>
        
            <div class="col-md-6" >
               
                <label>Department code</label>
               <input type="text"  class="form-control" required  [(ngModel)]="department.dept_code"  placeholder="Enter Department code"
                [ngModelOptions]="{standalone: true}" [ngClass]="{'error-field': registerButtonClicked && !dept_code}">
               
               <div *ngIf="registerButtonClicked && !dept_code" class="error-message">Department code is required.</div>
            </div>

<div class="col-md-6" >
               
    <label>Description</label>
   <input type="text"  class="form-control" required id="dept_description" name="department.dept_description"  [(ngModel)]="department.dept_description"  placeholder="Enter Description "
    [ngModelOptions]="{standalone: true}" [ngClass]="{'error-field': registerButtonClicked && !dept_description}">
   
   <div *ngIf="registerButtonClicked && !dept_description" class="error-message">Description is required.</div>
</div>


      <div class="col-md-6">
      <label>Branch</label>

      <div class="custom-sel">
          <div class="form-control-wrapper">
        
  
            <mat-form-field>
              <!-- <mat-label>Favorite food</mat-label> -->
                        <mat-select placeholder="Select" [(ngModel)]="department.branch" [ngModelOptions]="{standalone: true}" #select multiple>
                          <div class="select-all">
                            <mat-checkbox [(ngModel)]="allSelected" [ngModelOptions]="{standalone: true}" (change)="toggleAllSelection()">
                              Select All
                            </mat-checkbox>
                          </div>
                              <input type="text" placeholder="Search Employee"
                                     class="form-control"
                                     [(ngModel)]="branchSearch"
                                     [ngModelOptions]="{standalone: true}"
                                     (click)="$event.stopPropagation()">
            
                          <!-- <mat-option *ngFor="let deparmentsec of   Branches" [value]="deparmentsec.id">
                            {{ deparmentsec.branch_name }} 
                          </mat-option> -->
                <mat-option
          *ngFor="let deparmentsec of filterEmployees()"
          [value]="deparmentsec.id">

          {{ deparmentsec.branch_name }}

        </mat-option>
                        </mat-select>
            </mat-form-field>
            
          </div>
          <div *ngIf="registerButtonClicked && (!branch || branch.length === 0)" class="error-message">
            Please Select Your branch
          </div>
        </div>
                  
  
  </div>
        </div>
    </form>

    <div class="row">
        <div class="col-md-8"></div>
        <div class="col-md-2">
            <button (click)="ClosePopup()"   class="pull-right btn btn-danger btn-full mt-4" >Cancel</button>

        </div>
        <div class="col-md-2">
            <button   mat-raised-button color="primary" class="pull-right btn-full mt-4" type="submit" (click)="updateCategory()" >Save</button>

        </div>
    </div>


        </div>
</div>
<div mat-dialog-action>
    
</div>
