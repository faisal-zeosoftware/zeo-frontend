<div class="container" *ngIf="hasViewPermission">
  <div class="comapny_section">

 

      <div class="com_list">
  <div class="cpm-sec" *ngIf="hasViewPermission">

      <div class="punching-card shadow-lg">
    
          <div class="punch-header text-center py-4">
            <h1 class="font-weight-bold">Employee Face / Barcode Register  Portal</h1>
     
            <div class="row">
              <div class="col-md-4">

              </div>
              <div class="col-md-4">

                  <div class="custom-sel mt-2">
                      <select class="form-control"  [(ngModel)]="employeeId" [ngModelOptions]="{standalone: true}">
                        <option [value]="null" disabled>--Select Employee--</option>
                        <option *ngFor="let emp of Employees" [value]="emp.id">{{ emp.emp_code }} - {{ emp.emp_first_name }}</option>
                      </select>
                    </div>
              </div>
              </div>
           
       
          </div>
      
          <div class="row text-center p-2" *ngIf="!activeMode">
            <div class="col-md-2"></div>
            <div class="col-md-4">
              <div class="method-card" (click)="setMode('face')">
                <mat-icon class="method-icon face-color">face_unlock</mat-icon>
                <h3>Face Register</h3>
                <p class="small text-muted">Scan your face to register</p>
              </div>
            </div>
            <div class="col-md-4">
              <div class="method-card" (click)="setMode('barcode')">
                <mat-icon class="method-icon barcode-color">qr_code_scanner</mat-icon>
                <h3>Barcode / ID</h3>
                <p class="small text-muted">Scan your employee card</p>
              </div>
            </div>
            
          </div>
      
          <div class="camera-container text-center p-4" *ngIf="activeMode === 'face'">
            <div class="row">
          
       
           <div class="col-md-6" *ngIf="isCameraOpen">
             <div class="video-container position-relative">
               <video #videoElement autoplay class="w-100 rounded border bg-dark"></video>
               <div class="camera-overlay"></div>
             </div>
             <button type="button" class="btn btn-info btn-block mt-2" (click)="capturePhoto()">
               <mat-icon>camera_alt</mat-icon> Capture Photo
             </button>
           </div>
       
           <div class="col-md-6" *ngIf="isCameraOpen">
             <div class="preview-container text-center border rounded bg-light d-flex align-items-center justify-content-center" style="height: 300px;">
               <img *ngIf="capturedImage" [src]="capturedImage" class="img-fluid rounded shadow-sm" style="max-height: 100%;">
               <p *ngIf="!capturedImage" class="text-muted">Preview will appear here</p>
             </div>
             <div *ngIf="hasAddPermission">
             <button type="button" class="btn btn-success btn-block mt-2 py-2" [disabled]="!capturedImage || !employeeId" (click)="registerFace()">
               <mat-icon>save</mat-icon> Register Face to Profile
             </button>
             </div>
           </div>
           </div>

          </div>


         <div class="camera-container text-center p-4" *ngIf="activeMode === 'barcode'">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="barcode-scan-box p-4 border rounded bg-light shadow-sm">

        <mat-icon style="font-size: 60px;" class="text-primary mb-3">qr_code_2</mat-icon>

        <h4 class="fw-bold">Employee Barcode Generator</h4>
        <p class="text-muted">Generate or scan barcode for employee ID card</p>

        <!-- INPUT -->
        <div class="form-group mt-3">
          <input type="text"
                 class="form-control form-control-lg text-center"
                 placeholder="Barcode value"
                 [(ngModel)]="barcodeValue"
                 readonly>
        </div>

        <!-- BARCODE DISPLAY -->
        <div class="mt-4" *ngIf="barcodeValue">
          <svg id="barcode"></svg>
        </div>

        <!-- BUTTONS -->
        <div class="mt-4 d-grid gap-2" *ngIf="hasAddPermission">

          <button class="btn btn-primary"
                  [disabled]="!employeeId"
                  (click)="generateBarcode()">
            <mat-icon>qr_code</mat-icon> Generate Barcode
          </button>

          <button class="btn btn-info"
                  [disabled]="!barcodeValue"
                  (click)="downloadBarcode()">
            <mat-icon>download</mat-icon> Download Barcode
          </button>

          <button class="btn btn-success"
                  [disabled]="!barcodeValue || !employeeId"
                  (click)="registerBarcode()">
            <mat-icon>save</mat-icon> Register Barcode
          </button>

          <button class="btn btn-outline-secondary" (click)="setMode(null)">
            Cancel
          </button>

        </div>

      </div>

    </div>
  </div>
</div>


        </div>




 

 


      </div>

      </div>

     

</div>

</div>
