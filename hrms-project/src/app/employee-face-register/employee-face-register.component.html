<div class="container" *ngIf="hasViewPermission">
    <div class="comapny_section">

      <div class="header_section">

        <div class="row">
          <div class="col-md-3">
            <h1>Attendance Marking</h1>
          </div>
  
          <div class="col-md-4">
  
            <!-- <input type="text" class="form-control mt-1" placeholder="Search by name" > -->
  
          </div>
          <div class="col-md-5" *ngIf="hasAddPermission">
            <div class="button-group pull-right">

           
                           
  
  
  
            </div>
          </div>
  
        </div>
  
  
  
      </div>
  
        <div class="com_list mt-4">
    <div class="cpm-sec" *ngIf="hasViewPermission">

    
        <div class="registration-card shadow-sm p-4 bg-white rounded">
            <form>
              <div class="row align-items-end">
                <div class="col-md-6">
                  <label class="font-weight-bold">Select Employee</label>
                  <div class="custom-sel">
                    <select class="form-control" id="employee" name="employee" [(ngModel)]="employeeId" [ngModelOptions]="{standalone: true}">
                      <option [value]="null" disabled>--Select Employee--</option>
                      <option *ngFor="let emp of Employees" [value]="emp.id">{{ emp.emp_code }} - {{ emp.emp_first_name }}</option>
                    </select>
                  </div>
                </div>
                <div class="col-md-6 text-right">
                  <button type="button" class="btn btn-outline-primary" (click)="startCamera()" *ngIf="!isCameraOpen">
                    <mat-icon>videocam</mat-icon> Open Camera
                  </button>
                </div>
              </div>
          
              <div class="row mt-4" *ngIf="isCameraOpen">
                <div class="col-md-6">
                  <div class="video-container">
                    <video #videoElement autoplay class="w-100 rounded border"></video>
                    <div class="camera-overlay"></div>
                  </div>
                  <button type="button" class="btn btn-info btn-block mt-2" (click)="capturePhoto()">
                    <mat-icon>camera_alt</mat-icon> Capture Face
                  </button>
                </div>
          
                <div class="col-md-6">
                  <div class="preview-container text-center border rounded bg-light d-flex align-items-center justify-content-center" style="height: 250px;">
                    <img *ngIf="capturedImage" [src]="capturedImage" class="img-fluid rounded shadow-sm" style="max-height: 100%;">
                    <p *ngIf="!capturedImage" class="text-muted">Captured preview will appear here</p>
                  </div>
                  <button type="button" class="btn btn-success btn-block mt-2" 
                          [disabled]="!capturedImage || !employeeId" 
                          (click)="registerface()">
                    <mat-icon>save</mat-icon> Register Face to Profile
                  </button>
                </div>
              </div>
            </form>
          </div>





        </div>

        </div>

        


</div>

</div>
