<div mat-dialog-content class="">
  <div class="cpm-sec">
    <div class="pull-right">
      <span class="close-btn" (click)="ClosePopup()">×</span>
    </div>
    
    <h1>Connect Employee to User</h1>
    <hr>

    <form>
      <div class="row">
        <!-- Employee Info (Read-only) -->
        <div class="col-md-6">
          <label>Employee ID</label>
          <input type="text" class="form-control" [value]="employeeId" disabled>
        </div>

        <!-- Company Selection -->
        <div class="col-md-6">
          <label>Select Company</label>
          <div class="custom-sel">
            <select class="form-control" 
                    [(ngModel)]="selectedCompany" 
                    name="company" 
                    [ngModelOptions]="{standalone: true}"
                    (change)="onCompanyChange()">
              <option value="">Select a company</option>
              <option *ngFor="let company of companies" [ngValue]="company">{{ company.schema_name }}</option>
            </select>
          </div>
        </div>

        <!-- User Selection -->
        <div class="col-md-6">
          <label>Select User <span class="required-star">*</span></label>
          <div class="custom-sel">
            <select class="form-control" 
                    id="users" 
                    [(ngModel)]="selectedUser" 
                    name="user" 
                    [ngModelOptions]="{standalone: true}">
              <option value="">Select User</option>
              <option *ngFor="let user of users" [value]="user.id">{{ user.username }}</option>
            </select>
          </div>
          <div *ngIf="registerButtonClicked && !selectedUser" class="error-message">
            Please select a user
          </div>
        </div>
      </div>
    </form>

    <div class="row">
      <div class="col-md-8"></div>
      <div class="col-md-2">
        <button (click)="ClosePopup()" class="pull-right btn btn-danger btn-full mt-4">Cancel</button>
      </div>
      <div class="col-md-2">
        <button (click)="connectEmployeeToUser()" 
                mat-raised-button 
                color="primary" 
                class="pull-right btn-full mt-4">
          Connect
        </button>
      </div>
    </div>
  </div>
</div>
