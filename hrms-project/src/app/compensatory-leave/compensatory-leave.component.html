

<div class="container"  *ngIf="hasViewPermission">
    <div class="comapny_section">
        <div class="header_section">

            <div class="row">
                <div class="col-md-4">
                    <h1>Compensatory Leave Request</h1>
                </div>
                <div class="col-md-3">
                    
                    <!-- <input type="text" class="form-control mt-1" placeholder="Search by name " [(ngModel)]="searchQuery" (input)="filterEmployees()"> -->

                </div>
                <div class="col-md-5">
                  <div class="button-group pull-right">
                      <button type="button" (click)="openPopus()" class="btn-Create btn btn-success" *ngIf="hasAddPermission" ><span class="header-btn-icon"><mat-icon>add_circle
                      </mat-icon></span>Create</button>
                      <span *ngIf="!hasAddPermission"></span>

                      <button type="button" class="btn-Edit btn-info btn"  (click)="EditShowButtons()" *ngIf="hasEditPermission">
                          <span class="header-btn-icon">
                           <mat-icon>draw
                      </mat-icon></span> Edit</button>
                      <span *ngIf="hasEditPermission"></span>

                      <button type="button" class="btn-Delete btn btn-danger" (click)="toggleCheckboxes()" *ngIf="hasDeletePermission">
                          <span class="header-btn-icon">
                              <mat-icon> delete
                         </mat-icon></span> {{ Delete ? 'Cancel' : 'Delete' }}</button>
                         
                         <span *ngIf="!hasDeletePermission"></span>
                  </div>
              </div>
            </div>
           
           

        </div>

        <div class="row">
          <div class="col-md-2">
              
              <button  class=" mt-3 btn-danger btn " style="width: 100%;" color="warn" *ngIf="Delete" (click)="toggleSelectAllEmployees()">Select All</button>
  
          </div>
          <div class="col-md-3">
              <button class=" mt-3 btn-danger btn"  color="warn" *ngIf="Delete" (click)="deleteSelectedCombLeave()">Delete Selected </button>
  
          </div>
      </div>
      
      

        <div *ngIf="iscreateLoanApp" class="modal">
            <div class="modal-content">
              <div class="row">
                <div class="col-md-10">
                  <h2>Create Compensatory Leave</h2>
                </div>
  <div class="col-md-2 text-right">
    <!-- Styled Square Close Button -->
    <span class="close-btn" (click)="closeapplicationModal()">
      ×
    </span>
  </div> 
              </div>
              <hr />
          
        <form >

                        <div class="row">

                      <div class="col-md-6">
                        <label>Employee</label>
                        <div class="custom-sel">
                          <select class="form-control" id="employee" name="employee" [(ngModel)]="employee" [ngModelOptions]="{standalone: true}">
                            <option *ngFor="let employee of Employees" [value]="employee.id">{{ employee.emp_code }}</option>
                          </select>
                        </div>
                      </div>

                            <div class="col-md-6" >
                                <label>Request type</label>
                                <div class="custom-sel">
                                  <select class="form-control" id="request_type" name="request_type" [(ngModel)]="request_type" [ngModelOptions]="{standalone: true}">
                                    <option value="work_request">work Request</option>
                                    <option value="leave_request">Compansatory Leave Request</option>
                                  </select>
                                </div>
                              </div>

                                  
                      <div class="col-md-6">
                        <label>Work Date</label>
                        <input type="date" class="form-control" required [(ngModel)]="work_date" placeholder="Enter work Date"
                               [ngModelOptions]="{standalone: true}" [ngClass]="{'error-field': registerButtonClicked && !work_date}">
                        <div *ngIf="registerButtonClicked && !work_date" class="error-message">work Date is required.</div>
                      </div>
                  
                      <div class="col-md-6">
                        <label>Reason</label>
                        <textarea class="form-control" [(ngModel)]="reason" [ngModelOptions]="{standalone: true}"></textarea>
                      </div>



                            </div>


            <div class="row">
                <div class="col-md-8">
    
                </div>

        <div class="col-md-2">
          <button type="button" (click)="closeapplicationModal()"  class="btn btn-danger btn-full mt-5">Close</button>

        </div>
    
                <div class="col-md-2">
                    <button type="button" class="btn-Create btn-full mt-5 btn-success btn" (click)="requestCompansatoryLeave()">Save</button>  
                 </div>
            </div>
            
       
    </form>

            
            </div>
          </div>

                     <!-- Edit Modal -->
<div *ngIf="isEditModalOpen" class="modal">
  <div class="modal-content">
    <div class="row">
      <div class="col-md-10">
        <h2>Edit Compensatory Transaction</h2>
      </div>
  <div class="col-md-2 text-right">
    <!-- Styled Square Close Button -->
    <span class="close-btn" (click)="closeEditModal()">
      ×
    </span>
  </div> 
    </div>
    <hr />
  
    <form >
                        <div class="row">

                      <div class="col-md-6">
                        <label>Employee</label>
                        <div class="custom-sel">
                          <select class="form-control" id="employee" name="employee" [(ngModel)]="editAsset.employee" [ngModelOptions]="{standalone: true}">
                            <option *ngFor="let employee of Employees" [value]="employee.id">{{ employee.emp_code }}</option>
                          </select>
                        </div>
                      </div>
                      
                            <div class="col-md-6" >
                                <label>Request type</label>
                                <div class="custom-sel">
                                  <select class="form-control" id="request_type" name="request_type" [(ngModel)]="editAsset.request_type" [ngModelOptions]="{standalone: true}">
                                    <option value="work_request">work Request</option>
                                    <option value="leave_request">Compansatory Leave Request</option>
                                  </select>
                                </div>
                              </div>

                                  
                      <div class="col-md-6">
                        <label>Work Date</label>
                        <input type="date" class="form-control" required [(ngModel)]="editAsset.work_date" placeholder="Enter work Date"
                               [ngModelOptions]="{standalone: true}" [ngClass]="{'error-field': registerButtonClicked && !work_date}">
                        <div *ngIf="registerButtonClicked && !work_date" class="error-message">work Date is required.</div>
                      </div>
                  
                      <div class="col-md-6">
                        <label>Reason</label>
                        <textarea class="form-control" [(ngModel)]="editAsset.reason" [ngModelOptions]="{standalone: true}"></textarea>
                      </div>



                            </div>

      <div class="row" >
        <div class="col-md-8"></div>
        <div class="col-md-2">
          <button type="button" (click)="closeEditModal()"  class="btn btn-danger btn-full mt-4">Close</button>

        </div>
        <div class="col-md-2">
          <button type="button" (click)="updateCombLeave()"  class="btn btn-success btn-full mt-4">Update</button>
        </div>
      </div>
    </form>
    
  
  
  </div>
  </div>



        <div class="com_list mt-4" *ngIf="hasViewPermission">


            <table width="100%" *ngIf="hasViewPermission">
                <thead>
                  <tr>
                    <th>No</th>
                    <th>Employee</th>
                    <th>Request type</th>
                    <th>Work Date</th>
                    <th>Reason</th>
                    <th>Action</th>
        
                   
                  </tr>
                </thead>
                <tbody>
                    
                  <tr *ngFor="let docs of compTransactions;let i = index">
                    <td data-label="No">{{ i + 1 }}</td> 
                    <td data-label="Employee">{{ docs.employee }}</td>
                    <td data-label="Request type">{{ docs.request_type }}</td>
                    <td data-label="Work Date">{{ docs.work_date }}</td> 
                    <td data-label="Reason">{{ docs.reason }}</td>
                    <td data-label="Action">
                      <button
                        mat-fab
                        color="primary"
                        aria-label="Edit icon"
                        *ngIf="showEditBtn"
      
                        
                        (click)="openEditModal(docs)"
                      >
                        <mat-icon style="color: white;">draw</mat-icon>
                      </button>
      
                      <mat-checkbox *ngIf="Delete" [(ngModel)]="docs.selected" ></mat-checkbox>
      
                    </td>
                  </tr>
              
                </tbody>
              </table>

        </div>
        </div>
        </div>
