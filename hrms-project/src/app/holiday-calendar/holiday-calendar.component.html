        <div class="com_list " >
    <div class="cpm-sec">

      

<!-- ================= LIST VIEW ================= -->
<div class="calendar-card" *ngFor="let cal of HolidaysCalendar">

  <!-- HEADER -->
  <div class="calendar-header">

    <!-- LEFT SIDE -->
    <div class="header-left">
      <h4 class="title">
        {{ cal.calendar_title }}
        <span class="year-badge">{{ cal.year }}</span>
      </h4>
    </div>
  
    <!-- RIGHT SIDE -->
    <div class="header-right">
  
      <!-- EDIT -->
      <button
        mat-icon-button
        class="icon-btn edit-btn"
        *ngIf="showEditBtn"
        (click)="openEditModalCal(cal); $event.stopPropagation()">
        <mat-icon>edit</mat-icon>
      </button>
  
      <!-- CHECKBOX -->
      <mat-checkbox
        *ngIf="Delete"
        [(ngModel)]="cal.selected">
      </mat-checkbox>
  
      <!-- CHEVRON -->
      <button
        mat-icon-button
        class="icon-btn expand-btn"
        (click)="cal.expanded = !cal.expanded; $event.stopPropagation()">
  
        <mat-icon [ngClass]="{'rotate-icon': cal.expanded}">
          expand_more
        </mat-icon>
  
      </button>
  
    </div>
  
  </div>

  <!-- BODY -->
  <div *ngIf="cal.expanded" class="holiday-list">

    <div class="table-header">
      <button class="btn btn-sm btn-primary"
        (click)="openHolidayModal(cal.id); $event.stopPropagation()">
        + Add Holiday
      </button>
    </div>

    <table class="table custom-table">

      <thead>
        <tr>
          <th>Description</th>
          <th>Start</th>
          <th>End</th>
          <!-- <th>Restricted</th> -->
          <th class="text-center">Action</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let h of cal.holiday_list">

          <td>{{ h.description }}</td>
          <td>{{ h.start_date }}</td>
          <td>{{ h.end_date }}</td>
          <!-- <td>
            <span class="badge"
                  [ngClass]="h.restricted ? 'badge-danger' : 'badge-success'">
              {{ h.restricted ? 'Restricted' : 'General' }}
            </span>
          </td> -->

          <td class="text-center">

            <button class="action-btn edit"
              (click)="openEditHolidayModal(h, cal.id); $event.stopPropagation()">
              <mat-icon>edit</mat-icon>
            </button>

            <button class="action-btn delete"
              (click)="deleteHoliday(h.id); $event.stopPropagation()">
              <mat-icon>delete</mat-icon>
            </button>

          </td>

        </tr>
      </tbody>

    </table>

  </div>

</div>

<!-- ================= EDIT HOLIDAY ================= -->
<div *ngIf="isEditHolidayModal" class="modal">
  <div class="modal-content">

    <h3>Edit Holiday</h3>
    <hr>

    <div class="row">

      <div class="col-md-6">
        <label>Description</label>
        <input type="text" [(ngModel)]="editHolidayData.description" class="form-control">
      </div>

      <div class="col-md-6">
        <label>Start Date</label>
        <input type="date" [(ngModel)]="editHolidayData.start_date" class="form-control">
      </div>

      <div class="col-md-6">
        <label>End Date</label>
        <input type="date" [(ngModel)]="editHolidayData.end_date" class="form-control">
      </div>

      <!-- <div class="col-md-6 mt-4">
        <label>
          <input type="checkbox" [(ngModel)]="editHolidayData.restricted">
          Restricted
        </label>
      </div> -->

    </div>

    <div class="row mt-3">
      <div class="col-md-8"></div>

      <div class="col-md-2">
        <button class="btn btn-danger btn-full" (click)="closeEditHolidayModal()">Close</button>
      </div>

      <div class="col-md-2">
        <button class="btn btn-success btn-full" (click)="updateHoliday()">Update</button>
      </div>
    </div>

  </div>
</div>
