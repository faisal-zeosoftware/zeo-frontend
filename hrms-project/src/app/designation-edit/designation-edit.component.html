<div mat-dialog-content class="">

    <div class="cpm-sec" *ngIf="designation" >
        <span class="close pull-right" (click)="ClosePopup()">&times;</span>

        <h1>Designation Edit</h1><hr>

        <form (submit)="updateDesignation()">
        <div class="row" >

            <div class="col-md-6" >
               
                <label>Job Title</label>
               <input type="text"  class="form-control" required id="desgntn_job_title" name="job_title"  [(ngModel)]="designation.desgntn_job_title"  placeholder="Enter Description "
                [ngModelOptions]="{standalone: true}" [ngClass]="{'error-field': registerButtonClicked && !desgntn_job_title}">
               
               <div *ngIf="registerButtonClicked && !desgntn_job_title" class="error-message">Designation name is required.</div>
            </div>

            <div class="col-md-6" >
               
                <label>Designation Code</label>
               <input type="text"  class="form-control" required  [(ngModel)]="designation.desgntn_code"  placeholder="Enter Code"
                [ngModelOptions]="{standalone: true}" [ngClass]="{'error-field': registerButtonClicked && !desgntn_code}">
               
               <div *ngIf="registerButtonClicked && !desgntn_code" class="error-message">code is required.</div>
            </div>
            <!-- <div class="col-md-6"  >
              
      <label>Catogary Tittle</label>
      <input type="text" [(ngModel)]="category.catogary_title" [ngModelOptions]="{standalone: true}" >

</div> -->


<div class="col-md-6" >
               
    <label>Description</label>
   <input type="text"  class="form-control" required id="desgntn_description" name="desgntn_description"  [(ngModel)]="designation.desgntn_description"  placeholder="Enter Description "
    [ngModelOptions]="{standalone: true}" [ngClass]="{'error-field': registerButtonClicked && !desgntn_description}">
   
   <div *ngIf="registerButtonClicked && !desgntn_description" class="error-message">Description is required.</div>
</div>


       
 <div class="col-md-6">
      <label>Branch</label>

      <div class="custom-sel">
          <div class="form-control-wrapper">
        
  
            <mat-form-field>
              <!-- <mat-label>Favorite food</mat-label> -->
                        <mat-select placeholder="Select" [(ngModel)]="designation.branch" [ngModelOptions]="{standalone: true}" #select multiple>
                          <div class="select-all">
                            <mat-checkbox [(ngModel)]="allSelected" [ngModelOptions]="{standalone: true}" (change)="toggleAllSelection()">
                              Select All
                            </mat-checkbox>
                          </div>
                              <input type="text" placeholder="Search Employee"
                                     class="form-control"
                                     [(ngModel)]="branchSearch"
                                     [ngModelOptions]="{standalone: true}"
                                     (click)="$event.stopPropagation()">
            
                          <!-- <mat-option *ngFor="let deparmentsec of   Branches" [value]="deparmentsec.id">
                            {{ deparmentsec.branch_name }} 
                          </mat-option> -->
                <mat-option
          *ngFor="let deparmentsec of filterEmployees()"
          [value]="deparmentsec.id">

          {{ deparmentsec.branch_name }}

        </mat-option>
                        </mat-select>
            </mat-form-field>
            
          </div>
          <div *ngIf="registerButtonClicked && (!branch || branch.length === 0)" class="error-message">
            Please Select Your branch
          </div>
        </div>
                  
  
  </div>   
      
        
        
   


        </div>
    </form>

    <div class="row">
        <div class="col-md-8"></div>
        <div class="col-md-2">
            <button (click)="ClosePopup()"   class="pull-right btn btn-danger btn-full mt-4" >Cancel</button>

        </div>
        <div class="col-md-2">
            <button   mat-raised-button color="primary" class="pull-right btn-full mt-4" type="submit" (click)="updateDesignation()" >Save</button>

        </div>
    </div>


        </div>
</div>
<div mat-dialog-action>
    
</div>
